<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' data: blob: https:; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data: https:; connect-src 'self' blob: https:; worker-src 'self' blob:; frame-src 'self' data: blob:;"
    >
    <title>PDF</title>
    <link rel="stylesheet" href="./pdfjs/pdf_viewer.css">
    <link rel="stylesheet" href="./pdf-font-fallbacks.css">
    <link rel="stylesheet" href="./pdf-viewer.css">
  </head>
  <body>
    <div class="pdf-app">
      <header class="pdf-toolbar">
        <div class="pdf-toolbar-group">
          <button class="pdf-btn ghost" id="pdf-sidebar-toggle" type="button" title="Sidebar">
            ☰
          </button>
          <span class="pdf-title" id="pdf-title">PDF Viewer</span>
        </div>
        <div class="pdf-toolbar-group">
          <button class="pdf-btn ghost" id="pdf-prev" type="button" title="Previous page">◀</button>
          <input class="pdf-page-input" id="pdf-page-input" type="number" min="1" value="1" aria-label="Page">
          <span class="pdf-page-count" id="pdf-page-count">/ 0</span>
          <button class="pdf-btn ghost" id="pdf-next" type="button" title="Next page">▶</button>
          <button class="pdf-btn ghost" id="pdf-zoom-out" type="button" title="Zoom out">−</button>
          <span class="pdf-zoom-label" id="pdf-zoom-label">100%</span>
          <button class="pdf-btn ghost" id="pdf-zoom-in" type="button" title="Zoom in">＋</button>
          <button class="pdf-btn ghost" id="pdf-fit-width" type="button" title="Fit width">Width</button>
          <button class="pdf-btn ghost" id="pdf-fit-page" type="button" title="Fit page">Page</button>
          <button class="pdf-btn ghost" id="pdf-rotate-left" type="button" title="Rotate left">⟲</button>
          <button class="pdf-btn ghost" id="pdf-rotate-right" type="button" title="Rotate right">⟳</button>
          <input class="pdf-search-input" id="pdf-search-input" type="text" placeholder="Search">
          <button class="pdf-btn ghost" id="pdf-search-prev" type="button" title="Search previous">↑</button>
          <button class="pdf-btn ghost" id="pdf-search-next" type="button" title="Search next">↓</button>
          <button class="pdf-btn ghost" id="pdf-invert" type="button" title="Invert">Invert</button>
          <button class="pdf-btn ghost" id="pdf-download" type="button" title="Download">DL</button>
          <button class="pdf-btn ghost" id="pdf-print" type="button" title="Print">Print</button>
          <button class="pdf-btn ghost" id="pdf-reload" type="button" title="Reload">Reload</button>
        </div>
        <div class="pdf-toolbar-group">
          <span class="pdf-status" id="pdf-status">Waiting</span>
        </div>
      </header>
      <div class="pdf-body" id="pdf-body">
        <aside class="pdf-sidebar is-hidden" id="pdf-sidebar" aria-label="PDF Sidebar">
          <div class="pdf-sidebar-tabs">
            <button class="pdf-tab is-active" id="pdf-tab-outline" type="button">Outline</button>
            <button class="pdf-tab" id="pdf-tab-thumbs" type="button">Thumbnails</button>
            <button class="pdf-sidebar-close" id="pdf-sidebar-close" type="button" title="Hide sidebar" aria-label="Hide sidebar">
              <svg viewBox="0 0 16 16" aria-hidden="true">
                <path d="M4 4l8 8M12 4l-8 8"></path>
              </svg>
            </button>
          </div>
          <div class="pdf-sidebar-panel is-active" id="pdf-outline" aria-label="Outline"></div>
          <div class="pdf-sidebar-panel" id="pdf-thumbnails" aria-label="Thumbnails"></div>
        </aside>
        <div class="pdf-scroll" id="pdf-scroll">
          <div class="pdf-pages pdfViewer" id="pdf-pages"></div>
        </div>
      </div>
    </div>

    <script type="module" src="./pdf-viewer.js"></script>
  </body>
</html>
